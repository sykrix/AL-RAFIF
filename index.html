<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>فاتورة حجز - استراحة الرفيف</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --surface: #ffffff;
      --text: #18212f;
      --muted: #667085;
      --line: #d9dee8;
      --brand: #155e75;
      --brand-strong: #0e475b;
      --accent: #b7791f;
      --ok: #087f5b;
      --shadow: 0 18px 50px rgba(24, 33, 47, 0.08);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Tahoma, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 76px;
      height: 58px;
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      object-fit: contain;
      padding: 4px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 36px);
      line-height: 1.25;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }

    .panel,
    .preview {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 18px;
    }

    .section-title {
      margin: 0 0 16px;
      font-size: 18px;
      line-height: 1.4;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
    }

    input {
      width: 100%;
      min-height: 46px;
      padding: 10px 12px;
      border: 1px solid #c6cfdd;
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font: inherit;
      outline: none;
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(21, 94, 117, 0.14);
    }

    input[readonly] {
      background: #eef1f3;
      color: #53606f;
      cursor: not-allowed;
    }

    .form-hint {
      margin: -4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .amount-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    button {
      min-height: 46px;
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 120ms ease, background 160ms ease;
      white-space: nowrap;
    }

    button:active {
      transform: translateY(1px);
    }

    .primary {
      flex: 1;
      background: var(--brand);
      color: #fff;
    }

    .primary:hover {
      background: var(--brand-strong);
    }

    .secondary {
      width: 46px;
      padding: 0;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
    }

    .secondary:hover {
      background: #f1f4f8;
    }

    button svg {
      width: 19px;
      height: 19px;
      flex: 0 0 auto;
    }

    .preview {
      display: flex;
      justify-content: center;
      overflow: hidden;
      padding: 18px;
    }

    .invoice {
      width: min(390px, 100%);
      min-height: 720px;
      padding: 22px;
      background:
        radial-gradient(circle at 18% 16%, rgba(255, 255, 255, 0.88) 0 20%, transparent 36%),
        radial-gradient(circle at 82% 28%, rgba(196, 193, 186, 0.28) 0 18%, transparent 34%),
        linear-gradient(135deg, #f2f1ed 0%, #e2e0da 46%, #cfcac1 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: inset 0 0 0 999px rgba(255, 255, 255, 0.70);
    }

    .invoice-head {
      display: grid;
      justify-items: center;
      gap: 8px;
      padding-bottom: 18px;
      border-bottom: 2px solid var(--brand);
      text-align: center;
    }

    .invoice-logo {
      width: 160px;
      max-width: 78%;
      height: 104px;
      object-fit: contain;
      display: block;
    }

    .invoice-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
      color: var(--brand);
    }

    .invoice-meta {
      color: var(--muted);
      font-size: 13px;
    }

    .invoice-stamps {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
      margin-top: 8px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
      text-align: right;
    }

    .invoice-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 18px;
      table-layout: fixed;
    }

    .invoice-table th,
    .invoice-table td {
      padding: 13px 10px;
      border: 1px solid var(--line);
      text-align: right;
      vertical-align: middle;
      overflow-wrap: anywhere;
    }

    .invoice-table th {
      width: 42%;
      background: #f4f7fb;
      color: var(--brand-strong);
      font-weight: 700;
    }

    .remaining {
      color: var(--ok);
      font-weight: 700;
    }

    .invoice-footer {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }

    .contact-line {
      margin-top: 10px;
      padding: 10px 12px;
      border: 1px solid rgba(21, 94, 117, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--brand-strong);
      font-weight: 700;
    }

    @media (max-width: 800px) {
      .layout {
        grid-template-columns: 1fr;
      }

      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .amount-row {
        grid-template-columns: 1fr;
      }

      .invoice {
        min-height: 680px;
      }
    }

    @media print {
      body {
        background: #fff;
      }

      .page {
        width: 100%;
        padding: 0;
      }

      header,
      .panel {
        display: none;
      }

      .layout {
        display: block;
      }

      .preview {
        border: 0;
        box-shadow: none;
        border-radius: 0;
        padding: 0;
      }

      .invoice {
        min-height: auto;
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <div class="brand">
        <img class="mark" src="al-rafif-logo.png" alt="شعار استراحة الرفيف">
        <div>
          <h1>فاتورة حجز استراحة الرفيف</h1>
          <p class="subtitle">عبّئ بيانات الحجز ثم حمّل الفاتورة.</p>
        </div>
      </div>
    </header>

    <div class="layout">
      <section class="panel" aria-labelledby="form-title">
        <h2 class="section-title" id="form-title">بيانات الفاتورة</h2>
        <form id="invoiceForm">
          <label>
            الاسم
            <input id="customerName" type="text" autocomplete="name" placeholder="مثال: محمد عبدالله" required>
          </label>

          <label>
            رقم الهاتف
            <input id="phoneNumber" type="tel" autocomplete="tel" placeholder="05xxxxxxxx" required>
          </label>

          <label>
            تاريخ الحجز
            <input id="bookingDate" type="date" required>
          </label>

          <div class="amount-row">
            <label>
              المبلغ الإجمالي
              <input id="totalAmount" type="number" min="0" step="0.01" placeholder="0" required>
            </label>

            <label>
              المبلغ المدفوع
              <input id="paidAmount" type="number" min="0" step="0.01" placeholder="0" required>
            </label>
          </div>

          <label>
            المبلغ المتبقي
            <input id="remainingAmount" type="number" min="0" step="0.01" placeholder="0" required>
          </label>

          <div class="actions">
            <button class="primary" type="submit">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <path d="M7 10l5 5 5-5"></path>
                <path d="M12 15V3"></path>
              </svg>
              تحميل PDF
            </button>

            <button class="secondary" type="button" id="printButton" title="طباعة أو حفظ PDF" aria-label="طباعة أو حفظ PDF">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M6 9V2h12v7"></path>
                <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                <path d="M6 14h12v8H6z"></path>
              </svg>
            </button>
          </div>
        </form>
      </section>

      <section class="preview" aria-label="معاينة الفاتورة">
        <article class="invoice" id="invoicePreview">
          <div class="invoice-head">
            <img class="invoice-logo" src="al-rafif-logo.png" alt="شعار استراحة الرفيف">
            <h2 class="invoice-title">فاتورة حجز رسمية</h2>
            <div class="invoice-meta">استراحة الرفيف | AL-RAFIF VILLA</div>
            <div class="invoice-stamps">
              <div id="invoiceNumber"></div>
              <div id="invoiceIssuedAt"></div>
            </div>
          </div>

          <table class="invoice-table">
            <tbody>
              <tr>
                <th>الاسم</th>
                <td id="previewName">-</td>
              </tr>
              <tr>
                <th>رقم الهاتف</th>
                <td id="previewPhone">-</td>
              </tr>
              <tr>
                <th>تاريخ الحجز</th>
                <td id="previewDate">-</td>
              </tr>
              <tr>
                <th>المبلغ الإجمالي</th>
                <td id="previewTotal">-</td>
              </tr>
              <tr>
                <th>المبلغ المدفوع</th>
                <td id="previewPaid">-</td>
              </tr>
              <tr>
                <th>المبلغ المتبقي</th>
                <td class="remaining" id="previewRemaining">-</td>
              </tr>
            </tbody>
          </table>

          <div class="invoice-footer">
            تم إصدار هذه الفاتورة بناءً على بيانات الحجز المدخلة.
          </div>
        </article>
      </section>
    </div>
  </main>

  <script src="logo-data.js"></script>
  <script>
    const fields = {
      name: document.getElementById('customerName'),
      phone: document.getElementById('phoneNumber'),
      date: document.getElementById('bookingDate'),
      total: document.getElementById('totalAmount'),
      paid: document.getElementById('paidAmount'),
      remaining: document.getElementById('remainingAmount')
    };

    const preview = {
      name: document.getElementById('previewName'),
      phone: document.getElementById('previewPhone'),
      date: document.getElementById('previewDate'),
      total: document.getElementById('previewTotal'),
      paid: document.getElementById('previewPaid'),
      remaining: document.getElementById('previewRemaining'),
      number: document.getElementById('invoiceNumber'),
      issuedAt: document.getElementById('invoiceIssuedAt')
    };

    const form = document.getElementById('invoiceForm');
    const printButton = document.getElementById('printButton');
    let remainingEdited = false;
    const propertyTerms = [
      'إدارة العقار غير مسؤولة عن فقدان الأغراض الشخصية ولا تتحمل أي تبعات تجاه الغرض المفقود.',
      'على المستأجر أخذ الحيطة والحذر عند استخدام حوض السباحة ومراقبة الأطفال، ويتحمل المستأجر جميع الإجراءات القانونية تجاه أي حالة غرق لا قدر الله.',
      'يجب المحافظة على مقتنيات المكان ورمي القمامة في المكان المخصص لها قبل المغادرة.',
      'سيتم خصم مبلغ التأمين في حالة الإضرار بأي من مقتنيات المكان من قبل المستأجر.',
      'قد يتم خصم مبلغ التأمين في حالة ترك المكان غير نظيف.',
      'يمنع الأكل والشرب داخل حوض السباحة، ويمنع استخدام الصابون والشامبو داخل أحواض السباحة.',
      'يمنع التدخين داخل الغرف.',
      'يمنع إدخال المشروبات الكحولية وتعاطيها داخل المكان، ويمنع التدخين داخل الأماكن المغلقة.',
      'يجب الالتزام بتوقيت الخروج من المكان، وفي حالة التأخر عن الخروج فقد يتم الخصم من مبلغ التأمين.',
      'يجب الالتزام بتوقيت الخروج من المكان.',
      'يمنع العبث بالمفاتيح الكهربائية الخاصة بمضخات الأحواض.',
      'يمنع الطبخ داخل المكان.',
      'استخدام العقار للحفلات كأعياد الميلاد والأعراس يترتب عليه مبلغ إضافي، فيرجى التنسيق المسبق.',
      'لا تتحمل إدارة العقار أي مسؤولية قانونية عن فقدان أو تلف الممتلكات الشخصية الخاصة بالمستأجر أو مرافقيه خلال فترة الإقامة.',
      'يجب الالتزام بأوقات تسجيل الدخول والخروج المحددة، ويعتبر أي تأخير في المغادرة دون تنسيق مسبق قد يؤدي إلى فرض رسوم إضافية أو خصم من مبلغ التأمين.',
      'يمنع إصدار أصوات مزعجة أو استخدام مكبرات الصوت داخل أو خارج الوحدة السكنية، ويطلب من الضيوف احترام خصوصية الجيران والهدوء العام داخل العقار.',
      'يتحمل المستأجر كامل المسؤولية القانونية عن أي سلوك مخالف للنظام العام أو الآداب العامة داخل العقار، ويحق للإدارة إنهاء الإقامة دون استرداد في حال المخالفة.'
    ];

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function formatMoney(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) {
        return '-';
      }

      return new Intl.NumberFormat('ar-AE', {
        minimumFractionDigits: number % 1 === 0 ? 0 : 2,
        maximumFractionDigits: 2
      }).format(number);
    }

    function formatDate(value) {
      if (!value) {
        return '-';
      }

      return new Intl.DateTimeFormat('ar-AE', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      }).format(new Date(`${value}T00:00:00`));
    }

    function getInvoiceData() {
      return {
        name: fields.name.value.trim(),
        phone: fields.phone.value.trim(),
        date: fields.date.value,
        total: fields.total.value,
        paid: fields.paid.value,
        remaining: fields.remaining.value
      };
    }

    function makeInvoiceNumber() {
      const now = new Date();
      const datePart = `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}`;
      return `RAF-${datePart}`;
    }

    function formatIssuedAt() {
      return new Intl.DateTimeFormat('ar-AE', {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      }).format(new Date());
    }

    function updateRemaining() {
      if (remainingEdited) {
        return;
      }

      const total = Number(fields.total.value);
      const paid = Number(fields.paid.value);

      if (Number.isFinite(total) && Number.isFinite(paid) && fields.total.value !== '' && fields.paid.value !== '') {
        fields.remaining.value = Math.max(total - paid, 0).toFixed(2).replace(/\.00$/, '');
      }
    }

    function updatePreview() {
      const data = getInvoiceData();
      preview.name.textContent = data.name || '-';
      preview.phone.textContent = data.phone || '-';
      preview.date.textContent = formatDate(data.date);
      preview.total.textContent = data.total ? `${formatMoney(data.total)} ريال` : '-';
      preview.paid.textContent = data.paid ? `${formatMoney(data.paid)} ريال` : '-';
      preview.remaining.textContent = data.remaining ? `${formatMoney(data.remaining)} ريال` : '-';
      preview.number.textContent = `رقم الفاتورة: ${makeInvoiceNumber()}`;
      preview.issuedAt.textContent = `تاريخ الإصدار: ${formatIssuedAt()}`;
    }

    function buildInvoiceFile(data) {
      const generatedAt = new Intl.DateTimeFormat('ar-AE', {
        dateStyle: 'full',
        timeStyle: 'short'
      }).format(new Date());

      return `<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>فاتورة حجز - ${escapeHtml(data.name || 'عميل')}</title>
  <style>
    body { margin: 0; padding: 32px; font-family: Tahoma, Arial, sans-serif; color: #18212f; background: #f7f8fa; }
    .invoice { max-width: 760px; margin: auto; padding: 34px; background: #fff; border: 1px solid #d9dee8; }
    .head { display: flex; justify-content: space-between; gap: 18px; padding-bottom: 22px; border-bottom: 2px solid #155e75; }
    h1 { margin: 0; color: #155e75; font-size: 30px; }
    .muted { margin-top: 8px; color: #667085; font-size: 13px; }
    table { width: 100%; border-collapse: collapse; margin-top: 28px; table-layout: fixed; }
    th, td { padding: 14px 12px; border: 1px solid #d9dee8; text-align: right; overflow-wrap: anywhere; }
    th { width: 36%; background: #f4f7fb; color: #0e475b; }
    .remaining { color: #087f5b; font-weight: 700; }
    .footer { margin-top: 28px; padding-top: 18px; border-top: 1px solid #d9dee8; color: #667085; font-size: 13px; }
    @media print { body { padding: 0; background: #fff; } .invoice { border: 0; } }
  </style>
</head>
<body>
  <main class="invoice">
    <div class="head">
      <div>
        <h1>فاتورة حجز</h1>
        <div class="muted">استراحة الرفيف</div>
      </div>
      <div class="muted">تاريخ الإصدار: ${escapeHtml(generatedAt)}</div>
    </div>
    <table>
      <tbody>
        <tr><th>الاسم</th><td>${escapeHtml(data.name || '-')}</td></tr>
        <tr><th>رقم الهاتف</th><td>${escapeHtml(data.phone || '-')}</td></tr>
        <tr><th>تاريخ الحجز</th><td>${escapeHtml(formatDate(data.date))}</td></tr>
        <tr><th>المبلغ الإجمالي</th><td>${escapeHtml(data.total ? `${formatMoney(data.total)} ريال` : '-')}</td></tr>
        <tr><th>المبلغ المدفوع</th><td>${escapeHtml(data.paid ? `${formatMoney(data.paid)} ريال` : '-')}</td></tr>
        <tr><th>المبلغ المتبقي</th><td class="remaining">${escapeHtml(data.remaining ? `${formatMoney(data.remaining)} ريال` : '-')}</td></tr>
      </tbody>
    </table>
    <div class="footer">تم إصدار هذه الفاتورة بناءً على بيانات الحجز المدخلة.</div>
  </main>
</body>
</html>`;
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = reject;
        image.src = src;
      });
    }

    function drawImageFit(ctx, image, x, y, width, height) {
      const scale = Math.min(width / image.naturalWidth, height / image.naturalHeight);
      const drawWidth = image.naturalWidth * scale;
      const drawHeight = image.naturalHeight * scale;
      ctx.drawImage(image, x + (width - drawWidth) / 2, y + (height - drawHeight) / 2, drawWidth, drawHeight);
    }

    function drawRoundRect(ctx, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + width, y, x + width, y + height, r);
      ctx.arcTo(x + width, y + height, x, y + height, r);
      ctx.arcTo(x, y + height, x, y, r);
      ctx.arcTo(x, y, x + width, y, r);
      ctx.closePath();
    }

    function drawText(ctx, text, x, y, options = {}) {
      ctx.save();
      ctx.font = options.font || '14px Tahoma, Arial, sans-serif';
      ctx.fillStyle = options.color || '#18212f';
      ctx.textAlign = options.align || 'right';
      ctx.textBaseline = options.baseline || 'alphabetic';
      ctx.direction = options.direction || 'rtl';
      ctx.fillText(String(text || '-'), x, y);
      ctx.restore();
    }

    function wrapText(ctx, text, maxWidth) {
      const value = String(text || '-').trim() || '-';
      const words = value.split(/\s+/);
      const lines = [];
      let line = '';

      words.forEach((word) => {
        const test = line ? `${line} ${word}` : word;
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line);
          line = word;
        } else {
          line = test;
        }
      });

      lines.push(line);
      return lines;
    }

    function drawWrappedText(ctx, text, x, y, maxWidth, lineHeight, options = {}) {
      ctx.save();
      ctx.font = options.font || '14px Tahoma, Arial, sans-serif';
      ctx.fillStyle = options.color || '#18212f';
      ctx.textAlign = options.align || 'right';
      ctx.textBaseline = 'top';
      ctx.direction = options.direction || 'rtl';

      const lines = wrapText(ctx, text, maxWidth);
      lines.forEach((line, index) => {
        ctx.fillText(line, x, y + (index * lineHeight));
      });

      ctx.restore();
      return lines.length * lineHeight;
    }

    function dataUrlToBytes(dataUrl) {
      const binary = atob(dataUrl.split(',')[1]);
      const bytes = new Uint8Array(binary.length);
      for (let index = 0; index < binary.length; index += 1) {
        bytes[index] = binary.charCodeAt(index);
      }
      return bytes;
    }

    function textBytes(text) {
      return new TextEncoder().encode(text);
    }

    function mergeBytes(chunks) {
      const total = chunks.reduce((sum, chunk) => sum + chunk.length, 0);
      const output = new Uint8Array(total);
      let offset = 0;
      chunks.forEach((chunk) => {
        output.set(chunk, offset);
        offset += chunk.length;
      });
      return output;
    }

    function createPdfFromCanvases(canvases, pageWidth, pageHeight) {
      const encoder = new TextEncoder();
      const chunks = [];
      const offsets = [0];
      let length = 0;

      function addChunk(chunk) {
        chunks.push(chunk);
        length += chunk.length;
      }

      function addText(text) {
        addChunk(encoder.encode(text));
      }

      function addObject(number, parts) {
        offsets[number] = length;
        addText(`${number} 0 obj\n`);
        parts.forEach((part) => {
          if (typeof part === 'string') {
            addText(part);
          } else {
            addChunk(part);
          }
        });
        addText('\nendobj\n');
      }

      const pages = canvases.map((canvas, index) => ({
        canvas,
        pageObject: 3 + (index * 3),
        contentObject: 4 + (index * 3),
        imageObject: 5 + (index * 3),
        imageName: `Im${index}`
      }));

      addText('%PDF-1.4\n');
      addObject(1, ['<< /Type /Catalog /Pages 2 0 R >>']);
      addObject(2, [`<< /Type /Pages /Kids [${pages.map((page) => `${page.pageObject} 0 R`).join(' ')}] /Count ${pages.length} >>`]);

      pages.forEach((page) => {
        const imageBytes = dataUrlToBytes(page.canvas.toDataURL('image/jpeg', 0.94));
        const content = textBytes(`q\n${pageWidth} 0 0 ${pageHeight} 0 0 cm\n/${page.imageName} Do\nQ`);

        addObject(page.pageObject, [`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pageWidth} ${pageHeight}] /Resources << /XObject << /${page.imageName} ${page.imageObject} 0 R >> >> /Contents ${page.contentObject} 0 R >>`]);
        addObject(page.contentObject, [`<< /Length ${content.length} >>\nstream\n`, content, '\nendstream']);
        addObject(page.imageObject, [
          `<< /Type /XObject /Subtype /Image /Width ${page.canvas.width} /Height ${page.canvas.height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${imageBytes.length} >>\nstream\n`,
          imageBytes,
          '\nendstream'
        ]);
      });

      const xrefOffset = length;
      const objectCount = 2 + (pages.length * 3);
      addText(`xref\n0 ${objectCount + 1}\n0000000000 65535 f \n`);
      for (let number = 1; number <= objectCount; number += 1) {
        addText(`${String(offsets[number]).padStart(10, '0')} 00000 n \n`);
      }
      addText(`trailer\n<< /Size ${objectCount + 1} /Root 1 0 R >>\nstartxref\n${xrefOffset}\n%%EOF`);

      return new Blob([mergeBytes(chunks)], { type: 'application/pdf' });
    }

    async function renderInvoiceCanvas(data) {
      const pageWidth = 390;
      const pageHeight = 844;
      const scale = 3;
      const canvas = document.createElement('canvas');
      canvas.width = pageWidth * scale;
      canvas.height = pageHeight * scale;

      const ctx = canvas.getContext('2d');
      ctx.scale(scale, scale);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, pageWidth, pageHeight);

      const logoSource = window.AL_RAFIF_LOGO_DATA_URL || 'al-rafif-logo.png';
      const padding = 22;
      const contentWidth = pageWidth - (padding * 2);

      ctx.strokeStyle = '#d9dee8';
      ctx.lineWidth = 1;
      drawRoundRect(ctx, 12, 12, pageWidth - 24, pageHeight - 24, 8);
      ctx.stroke();

      try {
        const logo = await loadImage(logoSource);
        drawImageFit(ctx, logo, 96, 28, 198, 112);
      } catch (error) {
        drawText(ctx, 'AL-RAFIF VILLA', pageWidth / 2, 92, {
          font: 'bold 24px Tahoma, Arial, sans-serif',
          align: 'center',
          direction: 'ltr',
          color: '#18212f'
        });
      }

      drawText(ctx, 'فاتورة حجز رسمية', pageWidth / 2, 166, {
        font: 'bold 24px Tahoma, Arial, sans-serif',
        align: 'center',
        color: '#155e75'
      });
      drawText(ctx, 'استراحة الرفيف | AL-RAFIF VILLA', pageWidth / 2, 192, {
        font: '13px Tahoma, Arial, sans-serif',
        align: 'center',
        color: '#667085'
      });

      ctx.strokeStyle = '#155e75';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(padding, 220);
      ctx.lineTo(pageWidth - padding, 220);
      ctx.stroke();

      ctx.fillStyle = '#fbfcfe';
      drawRoundRect(ctx, padding, 236, contentWidth, 64, 8);
      ctx.fill();
      ctx.strokeStyle = '#d9dee8';
      ctx.lineWidth = 1;
      ctx.stroke();

      drawText(ctx, `رقم الفاتورة: ${makeInvoiceNumber()}`, pageWidth - padding - 12, 260, {
        font: '13px Tahoma, Arial, sans-serif',
        color: '#18212f'
      });
      drawText(ctx, `تاريخ الإصدار: ${formatIssuedAt()}`, pageWidth - padding - 12, 282, {
        font: '13px Tahoma, Arial, sans-serif',
        color: '#667085'
      });

      const rows = [
        ['الاسم', data.name || '-'],
        ['رقم الهاتف', data.phone || '-'],
        ['تاريخ الحجز', formatDate(data.date)],
        ['المبلغ الإجمالي', data.total ? `${formatMoney(data.total)} ريال` : '-'],
        ['المبلغ المدفوع', data.paid ? `${formatMoney(data.paid)} ريال` : '-'],
        ['المبلغ المتبقي', data.remaining ? `${formatMoney(data.remaining)} ريال` : '-']
      ];

      let y = 326;
      const labelWidth = 132;
      const valueWidth = contentWidth - labelWidth;

      rows.forEach(([label, value], index) => {
        ctx.font = '14px Tahoma, Arial, sans-serif';
        const valueLines = wrapText(ctx, value, valueWidth - 24);
        const rowHeight = Math.max(54, 22 + (valueLines.length * 20));

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(padding, y, contentWidth, rowHeight);
        ctx.fillStyle = '#f4f7fb';
        ctx.fillRect(pageWidth - padding - labelWidth, y, labelWidth, rowHeight);

        ctx.strokeStyle = '#d9dee8';
        ctx.lineWidth = 1;
        ctx.strokeRect(padding, y, contentWidth, rowHeight);
        ctx.beginPath();
        ctx.moveTo(pageWidth - padding - labelWidth, y);
        ctx.lineTo(pageWidth - padding - labelWidth, y + rowHeight);
        ctx.stroke();

        drawText(ctx, label, pageWidth - padding - 10, y + 33, {
          font: 'bold 13px Tahoma, Arial, sans-serif',
          color: '#0e475b'
        });

        drawWrappedText(ctx, value, pageWidth - padding - labelWidth - 12, y + 16, valueWidth - 24, 20, {
          font: index === rows.length - 1 ? 'bold 14px Tahoma, Arial, sans-serif' : '14px Tahoma, Arial, sans-serif',
          color: index === rows.length - 1 ? '#087f5b' : '#18212f'
        });

        y += rowHeight;
      });

      const remaining = Number(data.remaining);
      const status = Number.isFinite(remaining) && remaining <= 0 ? 'مدفوع بالكامل' : 'يوجد مبلغ متبقي';

      ctx.fillStyle = '#f8fbfa';
      drawRoundRect(ctx, padding, y + 22, contentWidth, 64, 8);
      ctx.fill();
      ctx.strokeStyle = '#c9ded8';
      ctx.stroke();
      drawText(ctx, 'الحالة المالية', pageWidth - padding - 14, y + 48, {
        font: 'bold 13px Tahoma, Arial, sans-serif',
        color: '#0e475b'
      });
      drawText(ctx, status, pageWidth - padding - 14, y + 72, {
        font: 'bold 15px Tahoma, Arial, sans-serif',
        color: '#087f5b'
      });

      const footerY = pageHeight - 88;
      ctx.strokeStyle = '#d9dee8';
      ctx.beginPath();
      ctx.moveTo(padding, footerY - 18);
      ctx.lineTo(pageWidth - padding, footerY - 18);
      ctx.stroke();
      drawWrappedText(ctx, 'تم إصدار هذه الفاتورة بناءً على بيانات الحجز المدخلة، وتعد مرجعاً رسمياً للحجز والمبالغ الموضحة أعلاه.', pageWidth - padding, footerY, contentWidth, 18, {
        font: '12px Tahoma, Arial, sans-serif',
        color: '#667085'
      });
      drawText(ctx, 'صفحة 1 من 2', pageWidth / 2, pageHeight - 28, {
        font: '11px Tahoma, Arial, sans-serif',
        align: 'center',
        color: '#98a2b3'
      });

      return { canvas, pageWidth, pageHeight };
    }

    async function renderTermsCanvas(data) {
      const pageWidth = 390;
      const pageHeight = 844;
      const scale = 3;
      const canvas = document.createElement('canvas');
      canvas.width = pageWidth * scale;
      canvas.height = pageHeight * scale;

      const ctx = canvas.getContext('2d');
      ctx.scale(scale, scale);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, pageWidth, pageHeight);

      const padding = 20;
      const contentWidth = pageWidth - (padding * 2);
      const logoSource = window.AL_RAFIF_LOGO_DATA_URL || 'al-rafif-logo.png';

      ctx.strokeStyle = '#d9dee8';
      ctx.lineWidth = 1;
      drawRoundRect(ctx, 12, 12, pageWidth - 24, pageHeight - 24, 8);
      ctx.stroke();

      try {
        const logo = await loadImage(logoSource);
        drawImageFit(ctx, logo, 118, 20, 154, 84);
      } catch (error) {
        drawText(ctx, 'AL-RAFIF VILLA', pageWidth / 2, 74, {
          font: 'bold 21px Tahoma, Arial, sans-serif',
          align: 'center',
          direction: 'ltr',
          color: '#18212f'
        });
      }

      drawText(ctx, 'سياسات العقار وشروط الحجز', pageWidth / 2, 126, {
        font: 'bold 21px Tahoma, Arial, sans-serif',
        align: 'center',
        color: '#155e75'
      });
      drawText(ctx, `رقم الفاتورة: ${makeInvoiceNumber()}`, pageWidth / 2, 149, {
        font: '12px Tahoma, Arial, sans-serif',
        align: 'center',
        color: '#667085'
      });

      ctx.strokeStyle = '#155e75';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(padding, 169);
      ctx.lineTo(pageWidth - padding, 169);
      ctx.stroke();

      const startY = 188;
      const bottomY = pageHeight - 58;
      const bulletX = pageWidth - padding - 10;
      const textRight = bulletX - 17;
      const maxTextWidth = contentWidth - 40;
      const configs = [
        { fontSize: 10.5, lineHeight: 14.5, rowPadding: 8, rowGap: 4 },
        { fontSize: 10, lineHeight: 13.5, rowPadding: 7, rowGap: 3 },
        { fontSize: 9.4, lineHeight: 12.5, rowPadding: 6, rowGap: 2 }
      ];

      function measureTerms(config) {
        ctx.font = `${config.fontSize}px Tahoma, Arial, sans-serif`;
        return propertyTerms.reduce((height, term) => {
          const lines = wrapText(ctx, term, maxTextWidth);
          return height + Math.max(25, config.rowPadding + (lines.length * config.lineHeight)) + config.rowGap;
        }, 0);
      }

      const config = configs.find((candidate) => measureTerms(candidate) <= bottomY - startY) || configs[configs.length - 1];
      let y = startY;

      propertyTerms.forEach((term, index) => {
        ctx.font = `${config.fontSize}px Tahoma, Arial, sans-serif`;
        const lines = wrapText(ctx, term, maxTextWidth);
        const rowHeight = Math.max(25, config.rowPadding + (lines.length * config.lineHeight));

        if (index % 2 === 0) {
          ctx.fillStyle = '#fbfcfe';
          drawRoundRect(ctx, padding, y, contentWidth, rowHeight, 6);
          ctx.fill();
        }

        ctx.strokeStyle = '#edf0f4';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(padding, y + rowHeight + 1);
        ctx.lineTo(pageWidth - padding, y + rowHeight + 1);
        ctx.stroke();

        ctx.fillStyle = index % 2 === 0 ? '#155e75' : '#b7791f';
        ctx.beginPath();
        ctx.arc(bulletX, y + 13, 3.4, 0, Math.PI * 2);
        ctx.fill();

        drawWrappedText(ctx, term, textRight, y + 6, maxTextWidth, config.lineHeight, {
          font: `${config.fontSize}px Tahoma, Arial, sans-serif`,
          color: '#18212f'
        });

        y += rowHeight + config.rowGap;
      });

      const footerY = pageHeight - 40;
      ctx.strokeStyle = '#d9dee8';
      ctx.beginPath();
      ctx.moveTo(padding, footerY - 15);
      ctx.lineTo(pageWidth - padding, footerY - 15);
      ctx.stroke();
      drawText(ctx, 'صفحة 2 من 2', pageWidth / 2, footerY, {
        font: '11px Tahoma, Arial, sans-serif',
        align: 'center',
        color: '#98a2b3'
      });

      return { canvas, pageWidth, pageHeight };
    }

    async function downloadInvoice() {
      const data = getInvoiceData();
      const invoicePage = await renderInvoiceCanvas(data);
      const termsPage = await renderTermsCanvas(data);
      const blob = createPdfFromCanvases([invoicePage.canvas, termsPage.canvas], invoicePage.pageWidth, invoicePage.pageHeight);
      const link = document.createElement('a');
      const cleanName = (data.name || 'فاتورة').replace(/[\\/:*?"<>|]/g, '-').trim();
      const objectUrl = URL.createObjectURL(blob);
      link.href = objectUrl;
      link.download = `فاتورة-${cleanName || 'حجز'}.pdf`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(objectUrl), 1000);
    }

    fields.total.addEventListener('input', () => {
      updateRemaining();
      updatePreview();
    });

    fields.paid.addEventListener('input', () => {
      updateRemaining();
      updatePreview();
    });

    fields.remaining.addEventListener('input', () => {
      remainingEdited = true;
      updatePreview();
    });

    Object.values(fields).forEach((field) => {
      field.addEventListener('input', updatePreview);
      field.addEventListener('change', updatePreview);
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      updateRemaining();
      updatePreview();
      try {
        await downloadInvoice();
      } catch (error) {
        alert('تعذر إنشاء ملف PDF. يرجى المحاولة مرة أخرى أو استخدام زر الطباعة.');
        console.error(error);
      }
    });

    printButton.addEventListener('click', () => {
      updateRemaining();
      updatePreview();
      window.print();
    });

    updatePreview();
  </script>
